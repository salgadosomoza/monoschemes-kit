<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Avatar - MonoSchemes</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="avatar.css">
</head>
<body>
  <div class="demo-container">
    <h1>Avatar</h1>
    <p class="body1">From MonoSchemes Design System</p>

    <table class="demo-table">
      <thead>
        <tr>
          <th></th>
          <th class="body1">Round</th>
          <th class="body1">Rounded</th>
          <th class="body1">Square</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td class="body1">Icon</td>
          <td>
            <div class="avatar" data-type="icon" data-style="round">
              <svg width="38.4" height="38.4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
              </svg>
            </div>
          </td>
          <td>
            <div class="avatar" data-type="icon" data-style="rounded">
              <svg width="38.4" height="38.4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
              </svg>
            </div>
          </td>
          <td>
            <div class="avatar" data-type="icon" data-style="square">
              <svg width="38.4" height="38.4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
              </svg>
            </div>
          </td>
        </tr>
        <tr>
          <td class="body1">Initials</td>
          <td>
            <div class="avatar" data-type="initials" data-style="round">
              <span class="avatar-initials">WM</span>
            </div>
          </td>
          <td>
            <div class="avatar" data-type="initials" data-style="rounded">
              <span class="avatar-initials">WM</span>
            </div>
          </td>
          <td>
            <div class="avatar" data-type="initials" data-style="square">
              <span class="avatar-initials">WM</span>
            </div>
          </td>
        </tr>
        <tr>
          <td class="body1">Image</td>
          <td>
            <div class="avatar" data-type="image" data-style="round">
              <svg width="38.4" height="38.4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
              </svg>
            </div>
          </td>
          <td>
            <div class="avatar" data-type="image" data-style="rounded">
              <svg width="38.4" height="38.4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
              </svg>
            </div>
          </td>
          <td>
            <div class="avatar" data-type="image" data-style="square">
              <svg width="38.4" height="38.4" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M21 19V5c0-1.1-.9-2-2-2H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2zM8.5 13.5l2.5 3.01L14.5 12l4.5 6H5l3.5-4.5z"/>
              </svg>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</body>
</html>
