<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button with Icon - MonoSchemes</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="button-icon.css">
</head>
<body>
  <nav class="component-nav">
    <a href="../../index.html">← Back to Home</a>
  </nav>

  <div class="demo-container">
    <h1>Button with Icon</h1>
    <p class="body1">Button component with leading or trailing icon — primary, secondary, and disabled variants.</p>

    <!-- Icon right (buttonLeft=False) -->
    <div class="demo-section">
      <h2>Icon Right</h2>
      <div class="demo-row">
        <!-- Primary -->
        <button class="btn btn-primary btn-icon icon-right" type="button">
          Download
          <span class="btn-icon-svg" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          </span>
        </button>
        <!-- Secondary -->
        <button class="btn btn-secondary btn-icon icon-right" type="button">
          Search
          <span class="btn-icon-svg" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
          </span>
        </button>
        <!-- Disabled -->
        <button class="btn btn-disabled btn-icon icon-right" type="button" disabled aria-disabled="true">
          Disabled
          <span class="btn-icon-svg" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          </span>
        </button>
      </div>
    </div>

    <!-- Icon left (buttonLeft=True) -->
    <div class="demo-section">
      <h2>Icon Left</h2>
      <div class="demo-row">
        <!-- Primary -->
        <button class="btn btn-primary btn-icon icon-left" type="button">
          <span class="btn-icon-svg" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm5 11h-4v4h-2v-4H7v-2h4V7h2v4h4v2z"/></svg>
          </span>
          Add item
        </button>
        <!-- Secondary -->
        <button class="btn btn-secondary btn-icon icon-left" type="button">
          <span class="btn-icon-svg" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          </span>
          Profile
        </button>
        <!-- Disabled -->
        <button class="btn btn-disabled btn-icon icon-left" type="button" disabled aria-disabled="true">
          <span class="btn-icon-svg" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
          </span>
          Disabled
        </button>
      </div>
    </div>

    <!-- Variants with different icons -->
    <div class="demo-section">
      <h2>With various icons</h2>
      <div class="demo-row">
        <button class="btn btn-primary btn-icon icon-left" type="button">
          <span class="btn-icon-svg" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          </span>
          Export
        </button>
        <button class="btn btn-secondary btn-icon icon-left" type="button">
          <span class="btn-icon-svg" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
          </span>
          Description
        </button>
        <button class="btn btn-secondary btn-icon icon-right" type="button">
          Location
          <span class="btn-icon-svg" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
          </span>
        </button>
        <button class="btn btn-primary btn-icon icon-right" type="button">
          Next
          <span class="btn-icon-svg" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
          </span>
        </button>
      </div>
    </div>

    <!-- Prev / Next pair -->
    <div class="demo-section">
      <h2>Navigation pair</h2>
      <div class="demo-row">
        <button class="btn btn-secondary btn-icon icon-left" type="button">
          <span class="btn-icon-svg" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
          </span>
          Prev
        </button>
        <button class="btn btn-secondary btn-icon icon-right" type="button">
          Next
          <span class="btn-icon-svg" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
          </span>
        </button>
      </div>
    </div>
  </div>

  <script src="button-icon.js"></script>
</body>
</html>
