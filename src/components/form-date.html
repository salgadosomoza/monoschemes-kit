<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Form Date - MonoSchemes</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="form-date.css">
</head>
<body>
  <nav class="component-nav">
    <a href="../../index.html">← Back to Home</a>
  </nav>

  <div class="demo-container">
    <h1>Form / Date</h1>
    <p class="body1">Date input with calendar icon.</p>

    <!-- Default -->
    <div class="demo-section">
      <h2>Default</h2>
      <div class="demo-row">
        <div class="form-field">
          <label class="form-label" for="date-default">Date</label>
          <div class="date-wrapper">
            <input class="date-input" id="date-default" type="date" aria-label="Select date">
            <svg class="date-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M20 3h-1V1h-2v2H7V1H5v2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 18H4V8h16v13z"/>
            </svg>
          </div>
          <span class="form-helper">Select a date</span>
        </div>
      </div>
    </div>

    <!-- With value -->
    <div class="demo-section">
      <h2>With value</h2>
      <div class="demo-row">
        <div class="form-field">
          <label class="form-label" for="date-value">Date</label>
          <div class="date-wrapper">
            <input class="date-input" id="date-value" type="date" value="2026-03-10" aria-label="Select date">
            <svg class="date-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M20 3h-1V1h-2v2H7V1H5v2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 18H4V8h16v13z"/>
            </svg>
          </div>
        </div>
      </div>
    </div>

    <!-- Types -->
    <div class="demo-section">
      <h2>Types</h2>
      <div class="demo-row">
        <div class="form-field">
          <label class="form-label" for="date-datetime">Date & Time</label>
          <div class="date-wrapper">
            <input class="date-input" id="date-datetime" type="datetime-local" aria-label="Select date and time">
            <svg class="date-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M20 3h-1V1h-2v2H7V1H5v2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 18H4V8h16v13z"/>
            </svg>
          </div>
        </div>
        <div class="form-field">
          <label class="form-label" for="date-month">Month</label>
          <div class="date-wrapper">
            <input class="date-input" id="date-month" type="month" aria-label="Select month">
            <svg class="date-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M20 3h-1V1h-2v2H7V1H5v2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 18H4V8h16v13z"/>
            </svg>
          </div>
        </div>
        <div class="form-field">
          <label class="form-label" for="date-disabled">Disabled</label>
          <div class="date-wrapper">
            <input class="date-input" id="date-disabled" type="date" disabled aria-label="Disabled date">
            <svg class="date-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M20 3h-1V1h-2v2H7V1H5v2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 18H4V8h16v13z"/>
            </svg>
          </div>
          <span class="form-helper">This field is disabled</span>
        </div>
      </div>
    </div>

    <!-- Date range -->
    <div class="demo-section">
      <h2>Date Range</h2>
      <div class="demo-row">
        <div class="form-field">
          <label class="form-label" for="date-from">From</label>
          <div class="date-wrapper">
            <input class="date-input" id="date-from" type="date" aria-label="Start date">
            <svg class="date-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M20 3h-1V1h-2v2H7V1H5v2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 18H4V8h16v13z"/>
            </svg>
          </div>
        </div>
        <div class="form-field">
          <label class="form-label" for="date-to">To</label>
          <div class="date-wrapper">
            <input class="date-input" id="date-to" type="date" aria-label="End date">
            <svg class="date-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M20 3h-1V1h-2v2H7V1H5v2H4c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 18H4V8h16v13z"/>
            </svg>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
