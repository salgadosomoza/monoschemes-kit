<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo - MonoSchemes</title>
  <link rel="stylesheet" href="../styles/tokens.css">
  <link rel="stylesheet" href="logo.css">
</head>
<body>
  <div class="demo-container">
    <h1>Logo</h1>
    <p class="body1">From MonoSchemes Design System</p>

    <div class="demo-row">
      <div class="demo-label body1">Text</div>
      <div class="logo" data-type="text">
        <span class="logo-text">Logo</span>
      </div>
    </div>

    <div class="demo-row">
      <div class="demo-label body1">Image</div>
      <div class="logo" data-type="image">
        <div class="logo-image" role="img" aria-label="Logo image placeholder"></div>
      </div>
    </div>
  </div>
</body>
</html>
